# Managed by certbot — edits should be re-applied via `sudo certbot --nginx ...`.
# Original generator: certbot's `nginx` plugin against the Phase 1 base in trientes.conf.
server {
    server_name 85.192.25.242 trientes.org www.trientes.org;

    client_max_body_size 10M;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    ssl_certificate /etc/letsencrypt/live/trientes.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/trientes.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.trientes.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = trientes.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name 85.192.25.242 trientes.org www.trientes.org;
    return 404; # managed by Certbot




}